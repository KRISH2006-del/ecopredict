{% extends "base.html" %}

{% block title %}Login | EcoPredict{% endblock %}

{% block content %}
<div class="container auth-container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your account</p>

    <form method="POST" class="auth-form">
        <div class="form-group">
            <label for="username">Username or Email</label>
            <input type="text" id="username" name="username" required placeholder="Enter your username or email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>

        <button type="submit">Sign In</button>
    </form>

    <div class="auth-footer">
        <p>Don't have an account? <a href="{{ url_for('auth.register') }}" class="link-primary">Register</a></p>
    </div>
</div>
{% endblock %}
