version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-production-secret-change-me}
    volumes:
      - ./waste.db:/app/waste.db
      - ./waste_model_pipeline.joblib:/app/waste_model_pipeline.joblib
      - ./ui_values.joblib:/app/ui_values.joblib
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
